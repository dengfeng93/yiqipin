version: '3.8'
services:
  postgres:
    image: postgis/postgis:15-3.3
    restart: always
    container_name: yiqipin-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-yiqipin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-yiqipin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-yiqipin}']
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: always
    container_name: yiqipin-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io}/yiqipin-api:${TAG:-latest}
    restart: always
    container_name: yiqipin-api
    environment:
      APP_ROLE: api
      NODE_ENV: production
    env_file: .env
    depends_on: [postgres, redis]
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    image: ${DOCKER_REGISTRY:-ghcr.io}/yiqipin-api:${TAG:-latest}
    restart: always
    container_name: yiqipin-worker
    command: ["node", "dist/main.worker.js"]
    environment:
      APP_ROLE: worker
      NODE_ENV: production
    env_file: .env
    depends_on: [postgres, redis]
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "main.worker" > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    image: ${DOCKER_REGISTRY:-ghcr.io}/yiqipin-admin:${TAG:-latest}
    restart: always
    container_name: yiqipin-admin
    depends_on: [api]

  nginx:
    build: ./nginx
    restart: always
    container_name: yiqipin-nginx
    ports: ['80:80', '443:443']
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./scripts/certbot-renew.sh:/usr/local/bin/certbot-renew.sh
      - certbot_data:/var/www/certbot
      - certbot_data:/etc/letsencrypt
    command: >
      sh -c "echo '0 3 * * 0 /usr/local/bin/certbot-renew.sh >> /var/log/certbot.log 2>&1' | crontab - && crond && nginx -g 'daemon off;'"
    depends_on: [api, admin]

  backup:
    build:
      context: ./server
      dockerfile: Dockerfile.backup
    restart: always
    container_name: yiqipin-backup
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER:-yiqipin}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-yiqipin}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup.sh
      - ./scripts/upload_to_cos.py:/usr/local/bin/upload_to_cos.py
    depends_on: [postgres]

volumes:
  pgdata:
  certbot_data:
